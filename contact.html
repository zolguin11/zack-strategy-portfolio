  <body>
    <div class="progress" aria-hidden="true"></div>
    <header class="site-header">
      <a class="brand" href="./index.html#top">Zack Olguin</a>

    <main>
      <section class="contact-page section">
        <div class="contact-layout reveal">
          <div class="contact-intro">
            <h1>I&apos;d love to talk.</h1>
            <div class="contact-actions">
              <a href="mailto:zolguin11@gmail.com">zolguin11@gmail.com</a>
              <a href="https://linkedin.com/in/zack-olguin/">LinkedIn</a>
            </div>
          </div>

          <form class="inquiry-form" id="inquiryForm">
            <label for="inquiryName">Name</label>
            <input id="inquiryName" name="name" type="text" autocomplete="name" required />

            <label for="inquirySubject">Subject line</label>
            <input id="inquirySubject" name="subject" type="text" required />

            <label for="inquiryMessage">Email</label>
            <textarea id="inquiryMessage" name="message" rows="7" required></textarea>

            <button type="submit">Open email draft</button>
          </form>
        </div>
      </section>
    </main>
    <footer class="site-footer">
      <p>Chicago, IL</p>
      <a href="mailto:zolguin11@gmail.com">zolguin11@gmail.com</a>

    </footer>
